kind = "web"
previewPath = "/"
title = "Ari — Sports Analytics Dashboard"
version = "1.0.0"
id = "artifacts/ari-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24973

[services.development]
run = "pnpm --filter @workspace/ari-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ari-dashboard", "run", "build" ]
publicDir = "artifacts/ari-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24973"
BASE_PATH = "/"

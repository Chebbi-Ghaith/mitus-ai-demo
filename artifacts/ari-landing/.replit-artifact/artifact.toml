kind = "web"
previewPath = "/"
title = "Mitus.AI website"
version = "1.0.0"
id = "artifacts/ari-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20697

[services.development]
run = "pnpm --filter @workspace/ari-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ari-landing", "run", "build" ]
publicDir = "artifacts/ari-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20697"
BASE_PATH = "/"

openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ari Sports Analytics API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: players
    description: Player management
  - name: sessions
    description: Training and match sessions
  - name: analysis
    description: Movement analysis and AI insights
  - name: Auth
    description: Browser and mobile authentication endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List all players
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Add a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerInput"
      responses:
        "201":
          description: Player created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get a player by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found
    put:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlayerInput"
      responses:
        "200":
          description: Player updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{id}/medical:
    get:
      operationId: getPlayerMedical
      tags: [players]
      summary: Get medical record for a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medical record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalRecord"
    put:
      operationId: updatePlayerMedical
      tags: [players]
      summary: Update medical record for a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMedicalInput"
      responses:
        "200":
          description: Medical record updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalRecord"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionInput"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}/analysis:
    get:
      operationId: getSessionAnalysis
      tags: [analysis]
      summary: Get AI movement analysis for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Movement analysis results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MovementAnalysis"

  /players/{id}/analysis:
    get:
      operationId: getPlayerAnalysis
      tags: [analysis]
      summary: Get all movement analyses for a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player movement analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MovementAnalysis"

  /players/{id}/protocols:
    get:
      operationId: getPlayerProtocols
      tags: [analysis]
      summary: Get AI-suggested injury prevention protocols for a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Prevention protocols
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PreventionProtocol"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [analysis]
      summary: Get overall team dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Player:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        number:
          type: integer
        position:
          type: string
        age:
          type: integer
        nationality:
          type: string
        height:
          type: number
        weight:
          type: number
        muscleMass:
          type: number
        injuryRisk:
          type: string
          enum: [low, medium, high]
        status:
          type: string
          enum: [active, injured, recovering]
        avatarUrl:
          type: string
          nullable: true
        wearableData:
          $ref: "#/components/schemas/WearableData"
      required:
        - id
        - name
        - number
        - position
        - age
        - nationality
        - height
        - weight
        - muscleMass
        - injuryRisk
        - status
        - wearableData

    WearableData:
      type: object
      properties:
        heartRate:
          type: integer
        heartRateMax:
          type: integer
        speed:
          type: number
        distance:
          type: number
        acceleration:
          type: number
        fatigue:
          type: integer
        lastUpdated:
          type: string
      required:
        - heartRate
        - heartRateMax
        - speed
        - distance
        - acceleration
        - fatigue
        - lastUpdated

    MedicalRecord:
      type: object
      properties:
        playerId:
          type: integer
        bloodType:
          type: string
        allergies:
          type: array
          items:
            type: string
        injuries:
          type: array
          items:
            $ref: "#/components/schemas/InjuryRecord"
        medications:
          type: array
          items:
            type: string
        notes:
          type: string
        lastExamDate:
          type: string
        clearanceStatus:
          type: string
          enum: [cleared, restricted, not-cleared]
      required:
        - playerId
        - bloodType
        - allergies
        - injuries
        - medications
        - notes
        - lastExamDate
        - clearanceStatus

    InjuryRecord:
      type: object
      properties:
        type:
          type: string
        date:
          type: string
        recovered:
          type: boolean
        notes:
          type: string
      required:
        - type
        - date
        - recovered
        - notes

    Session:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [match, training, recovery]
        date:
          type: string
        duration:
          type: integer
        playerIds:
          type: array
          items:
            type: integer
        description:
          type: string
        status:
          type: string
          enum: [scheduled, in-progress, completed]
      required:
        - id
        - type
        - date
        - duration
        - playerIds
        - description
        - status

    MovementAnalysis:
      type: object
      properties:
        id:
          type: integer
        playerId:
          type: integer
        sessionId:
          type: integer
        timestamp:
          type: string
        movementType:
          type: string
        correct:
          type: boolean
        riskScore:
          type: integer
        detectedIssues:
          type: array
          items:
            type: string
        bodyParts:
          type: array
          items:
            type: string
        recommendation:
          type: string
        confidence:
          type: number
      required:
        - id
        - playerId
        - sessionId
        - timestamp
        - movementType
        - correct
        - riskScore
        - detectedIssues
        - bodyParts
        - recommendation
        - confidence

    PreventionProtocol:
      type: object
      properties:
        id:
          type: integer
        playerId:
          type: integer
        title:
          type: string
        category:
          type: string
          enum: [warm-up, stretching, strength, recovery, mobility]
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/Exercise"
        frequency:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
        createdAt:
          type: string
      required:
        - id
        - playerId
        - title
        - category
        - exercises
        - frequency
        - priority
        - createdAt

    Exercise:
      type: object
      properties:
        name:
          type: string
        sets:
          type: integer
        reps:
          type: string
        duration:
          type: string
        notes:
          type: string
      required:
        - name
        - sets
        - reps
        - duration
        - notes

    DashboardStats:
      type: object
      properties:
        totalPlayers:
          type: integer
        activePlayers:
          type: integer
        injuredPlayers:
          type: integer
        highRiskPlayers:
          type: integer
        totalSessions:
          type: integer
        recentAnalyses:
          type: integer
        teamFatigue:
          type: number
        teamAvgHeartRate:
          type: number
      required:
        - totalPlayers
        - activePlayers
        - injuredPlayers
        - highRiskPlayers
        - totalSessions
        - recentAnalyses
        - teamFatigue
        - teamAvgHeartRate

    CreatePlayerInput:
      type: object
      properties:
        name:
          type: string
        number:
          type: integer
        position:
          type: string
        age:
          type: integer
        nationality:
          type: string
        height:
          type: number
        weight:
          type: number
        muscleMass:
          type: number
      required:
        - name
        - number
        - position
        - age
        - nationality
        - height
        - weight
        - muscleMass

    UpdatePlayerInput:
      type: object
      properties:
        name:
          type: string
        number:
          type: integer
        position:
          type: string
        age:
          type: integer
        nationality:
          type: string
        height:
          type: number
        weight:
          type: number
        muscleMass:
          type: number
        injuryRisk:
          type: string
          enum: [low, medium, high]
        status:
          type: string
          enum: [active, injured, recovering]

    UpdateMedicalInput:
      type: object
      properties:
        bloodType:
          type: string
        allergies:
          type: array
          items:
            type: string
        medications:
          type: array
          items:
            type: string
        notes:
          type: string
        lastExamDate:
          type: string
        clearanceStatus:
          type: string
          enum: [cleared, restricted, not-cleared]

    CreateSessionInput:
      type: object
      properties:
        type:
          type: string
          enum: [match, training, recovery]
        date:
          type: string
        duration:
          type: integer
        playerIds:
          type: array
          items:
            type: integer
        description:
          type: string
      required:
        - type
        - date
        - duration
        - playerIds
        - description
